<svg width="50" height="60" 
  xmlns="http://www.w3.org/2000/svg">
  
  <!-- Main foot shape -->
  <ellipse cx="20" cy="40" 
    rx="15" ry="18" 
    fill="#2D3436" 
    opacity="0.9"/>
  
  <!-- Heel circle -->
  <circle cx="20" cy="50" 
    r="10" 
    fill="#2D3436" 
    opacity="0.9"/>
  
  <!-- Toes (4 small circles) -->
  <circle cx="12" cy="15" 
    r="4" fill="#2D3436"/>
  <circle cx="20" cy="10" 
    r="4.5" fill="#2D3436"/>
  <circle cx="28" cy="12" 
    r="4" fill="#2D3436"/>
  <circle cx="35" cy="18" 
    r="3.5" fill="#2D3436"/>
  
  <!-- CO2 text inside foot -->
  <text x="15" y="35" 
    fill="white" 
    font-size="6" 
    font-family="Arial"
    transform="rotate(-15 15 35)">
    CO₂
  </text>
  <text x="22" y="42" 
    fill="white" 
    font-size="5" 
    font-family="Arial"
    transform="rotate(10 22 42)">
    CO₂
  </text>
  <text x="14" y="48" 
    fill="white" 
    font-size="5" 
    font-family="Arial"
    transform="rotate(-5 14 48)">
    CO₂
  </text>
  <text x="20" y="55" 
    fill="white" 
    font-size="6" 
    font-family="Arial"
    transform="rotate(20 20 55)">
    CO₂
  </text>
  
  <!-- Tiny CO2 in toes -->
  <text x="10" y="17" 
    fill="white" 
    font-size="3">
    CO₂
  </text>
  <text x="18" y="12" 
    fill="white" 
    font-size="3">
    CO₂
  </text>
  
</svg>
